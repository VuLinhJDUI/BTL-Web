<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLYFAN - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#d70018', dark: '#111827' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content.hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <div class="w-64 bg-dark text-white flex flex-col">
        <div class="p-5 text-2xl font-bold text-primary border-b border-gray-800 flex items-center gap-2">
            <i class="fa-solid fa-fan"></i>
            <span>ONLY<strong class="text-white">ADMIN</strong></span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('books')" id="btn-books" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-l-4 border-primary text-left">
                <i class="fa-solid fa-book w-5"></i> Quản lý Sách / SP
            </button>
            <button onclick="switchTab('categories')" id="btn-categories" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-left">
                <i class="fa-solid fa-layer-group w-5"></i> Quản lý Danh mục
            </button>
            <button onclick="switchTab('users')" id="btn-users" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-left">
                <i class="fa-solid fa-users w-5"></i> Quản lý Tài khoản
            </button>
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-left">
                <i class="fa-solid fa-box-open w-5"></i> Đơn hàng
            </button>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-primary text-left">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white px-6 py-4 flex justify-between items-center border-b">
            <h1 id="page-title" class="text-xl font-bold">Quản lý Sản phẩm / Sách</h1>
        </header>

        <main class="p-6">
            <div id="tab-books" class="tab-content bg-white rounded-lg shadow-sm border p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold">Danh sách Sách / Sản phẩm</h2>
                    <button onclick="openModal('book')" class="bg-primary hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Thêm mới
                    </button>
                </div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-600 border-b">
                        <tr>
                            <th class="p-3">ID</th>
                            <th class="p-3">Hình ảnh</th>
                            <th class="p-3">Tên Sách/SP</th>
                            <th class="p-3">Danh mục</th>
                            <th class="p-3">Giá tiền</th>
                            <th class="p-3 text-right">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="book-list-table"></tbody>
                </table>
            </div>

            <div id="tab-categories" class="tab-content hidden bg-white rounded-lg shadow-sm border p-6">
                <h2 class="text-lg font-semibold mb-4">Quản lý Danh mục</h2>
            </div>

            <div id="tab-users" class="tab-content hidden bg-white rounded-lg shadow-sm border p-6">
                <h2 class="text-lg font-semibold mb-4">Quản lý Tài khoản</h2>
            </div>

            <div id="tab-orders" class="tab-content hidden bg-white rounded-lg shadow-sm border p-6">
                <h2 class="text-lg font-semibold mb-4">Trạng thái Đơn hàng</h2>
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 text-gray-600 border-b">
                        <tr>
                            <th class="p-3">Mã Đơn</th>
                            <th class="p-3">Khách hàng</th>
                            <th class="p-3">Ngày đặt</th>
                            <th class="p-3">Tổng tiền</th>
                            <th class="p-3">Trạng thái</th>
                            <th class="p-3 text-right">Xử lý</th>
                        </tr>
                    </thead>
                    <tbody id="order-list-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="form-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modal-title" class="text-lg font-bold">Thêm Sách / Sản Phẩm</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <form id="crud-form" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="edit-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Tên sách / sản phẩm</label>
                        <input type="text" id="input-name" required class="w-full border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Danh mục</label>
                        <input type="text" id="input-category" class="w-full border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Giá bán</label>
                        <input type="number" id="input-price" required class="w-full border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Hình ảnh</label>
                        <input type="text" id="input-image" class="w-full border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-6 border-t pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md text-sm">Hủy</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md text-sm">Lưu dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
