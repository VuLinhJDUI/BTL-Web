<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập ONLYFAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style_pages.css">
    <style>
        .logo-box {
            text-align: center;
            margin-bottom: 24px;
            font-size: 28px;
            font-weight: 700;
            color: #d70018;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .logo-box i { color: #d70018; }
        .logo-box span { color: #111827; }
        .auth-redirect {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        .auth-redirect a {
            color: #d70018;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="auth-body">

    <div class="auth-container">
        <a href="index.html" class="logo-box">
            <i class="fa-solid fa-fan"></i>
            <span>ONLY<strong style="color: #d70018;">FAN</strong></span>
        </a>

        <h1 class="auth-title">Đăng nhập tài khoản</h1>
        
        <form class="auth-form" id="login-form">
            <div class="form-group">
                <label for="phone">Số điện thoại hoặc Email</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại hoặc email">
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                    <i class="fa-regular fa-eye password-toggle" style="cursor: pointer;"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        
        <div class="auth-redirect">
            Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
