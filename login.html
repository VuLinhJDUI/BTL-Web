<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập ONLYFAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style_pages.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <h1 class="auth-title">Đăng nhập ONLYFAN</h1>
        
        <form class="auth-form" id="login-form">
            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại của bạn">
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                    <i class="fa-regular fa-eye password-toggle"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        
        <div class="auth-links">
            <a href="#" class="forgot-password">Quên mật khẩu?</a>
        </div>
        
        <div class="auth-divider">
            <span>Hoặc đăng nhập bằng</span>
        </div>
        
        <div class="social-login">
            <button class="btn-social btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Google
            </button>
            <button class="btn-social btn-zalo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_Zalo.svg" alt="Zalo">
                Zalo
            </button>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
